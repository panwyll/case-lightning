<svg xmlns="http://www.w3.org/2000/svg" width="1366" height="768" viewBox="0 0 1366 768" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5A27E0"/>
      <stop offset="1" stop-color="#3A12A8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#1a0a4a" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1366" height="768" fill="#F4F1FE"/>
  <rect width="760" height="768" fill="url(#bg)"/>

  <g fill="#FFFFFF">
    <g transform="translate(80,150)">
      <rect width="44" height="44" rx="11" fill="#FFFFFF"/>
      <path d="M9 22 C15 13 21 13 26 22 C31 31 37 31 43 22" transform="translate(-2,-2)" fill="none" stroke="#5A27E0" stroke-width="4.5" stroke-linecap="round"/>
      <text x="60" y="30" font-size="26" font-weight="700">CONVEYi</text>
    </g>
    <text x="80" y="320" font-size="56" font-weight="800">Client-ready replies,</text>
    <text x="80" y="384" font-size="56" font-weight="800">drafted from your files.</text>
    <text x="80" y="454" font-size="25" fill="#E4DBFF">Each draft is written like a careful solicitor would —</text>
    <text x="80" y="488" font-size="25" fill="#E4DBFF">checking amounts, dates and attachments — then saved</text>
    <text x="80" y="522" font-size="25" fill="#E4DBFF">to your Outlook Drafts. Never sent automatically.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="812" y="92" width="478" height="584" rx="26" fill="#FFFFFF"/>
  </g>
  <g transform="translate(812,92)">
    <!-- top bar -->
    <circle cx="44" cy="46" r="14" fill="#F1ECFD"/>
    <circle cx="82" cy="46" r="14" fill="#F1ECFD"/>
    <rect x="300" y="34" width="56" height="24" rx="12" fill="#EDE7FB"/>
    <text x="328" y="51" font-size="13" font-weight="700" fill="#5A27E0" text-anchor="middle">TRIAL</text>
    <text x="446" y="51" font-size="15" fill="#3A3247" text-anchor="end">Peter Anwyll</text>

    <!-- header -->
    <text x="32" y="100" font-size="13" font-weight="700" fill="#8A839B" letter-spacing="0.5">DRAFT REPLY · SMITH-X</text>

    <!-- tone chips -->
    <rect x="32" y="116" width="92" height="30" rx="15" fill="#5A27E0"/>
    <text x="78" y="136" font-size="13.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">Neutral</text>
    <rect x="132" y="116" width="74" height="30" rx="15" fill="#FFFFFF" stroke="#D9D2EC"/>
    <text x="169" y="136" font-size="13.5" font-weight="600" fill="#6B6480" text-anchor="middle">Firm</text>
    <rect x="214" y="116" width="92" height="30" rx="15" fill="#FFFFFF" stroke="#D9D2EC"/>
    <text x="260" y="136" font-size="13.5" font-weight="600" fill="#6B6480" text-anchor="middle">Chasing</text>

    <!-- draft body -->
    <rect x="32" y="162" width="414" height="300" rx="16" fill="#FBFAFF" stroke="#ECE7F8"/>
    <g fill="#2B2540" font-size="14.5">
      <text x="52" y="192">Dear Ms Hartley,</text>
      <text x="52" y="224">Thank you for your email. I confirm we have</text>
      <text x="52" y="245">received the draft contract for 12 Oak Lane.</text>
      <text x="52" y="277">Please find enclosed the EPC and the completed</text>
      <text x="52" y="298">TA10 fixtures &amp; fittings form. We are content with</text>
      <text x="52" y="319">completion 28 days after exchange and will revert</text>
      <text x="52" y="340">with the signed contract shortly.</text>
      <text x="52" y="384">Kind regards,</text>
      <text x="52" y="405">Peter Anwyll</text>
    </g>
    <text x="52" y="440" font-size="12.5" fill="#9A93AC">·  Drafted from the SMITH-X matter file</text>

    <!-- footer note + buttons -->
    <text x="32" y="492" font-size="13.5" fill="#7A7388">Saved to your Outlook Drafts — review &amp; send there.</text>
    <rect x="32" y="506" width="200" height="46" rx="12" fill="#FFFFFF" stroke="#5A27E0"/>
    <text x="132" y="535" font-size="15.5" font-weight="700" fill="#5A27E0" text-anchor="middle">Regenerate</text>
    <rect x="246" y="506" width="200" height="46" rx="12" fill="#F1ECFD"/>
    <text x="346" y="535" font-size="15.5" font-weight="700" fill="#5A27E0" text-anchor="middle">Add guidance</text>

    <!-- bottom nav -->
    <line x1="0" y1="572" x2="478" y2="572" stroke="#EEEAF7"/>
    <rect x="150" y="598" width="40" height="3" rx="1.5" fill="#5A27E0"/>
    <text x="170" y="594" font-size="20" fill="#5A27E0" text-anchor="middle">✉</text>
    <text x="239" y="594" font-size="20" fill="#B7B1C4" text-anchor="middle">⌂</text>
    <text x="308" y="594" font-size="18" fill="#B7B1C4" text-anchor="middle">📎</text>
  </g>
</svg>
