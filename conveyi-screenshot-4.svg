<svg xmlns="http://www.w3.org/2000/svg" width="1366" height="768" viewBox="0 0 1366 768" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5A27E0"/>
      <stop offset="1" stop-color="#3A12A8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#1a0a4a" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1366" height="768" fill="#F4F1FE"/>
  <rect width="760" height="768" fill="url(#bg)"/>

  <g fill="#FFFFFF">
    <g transform="translate(80,150)">
      <rect width="44" height="44" rx="11" fill="#FFFFFF"/>
      <path d="M9 22 C15 13 21 13 26 22 C31 31 37 31 43 22" transform="translate(-2,-2)" fill="none" stroke="#5A27E0" stroke-width="4.5" stroke-linecap="round"/>
      <text x="60" y="30" font-size="26" font-weight="700">CONVEYi</text>
    </g>
    <text x="80" y="320" font-size="57" font-weight="800">Generate documents</text>
    <text x="80" y="385" font-size="57" font-weight="800">from the case file.</text>
    <text x="80" y="455" font-size="25" fill="#E4DBFF">Fill your firm's templates with the right facts from each</text>
    <text x="80" y="489" font-size="25" fill="#E4DBFF">matter — client care letters, completion statements, TA</text>
    <text x="80" y="523" font-size="25" fill="#E4DBFF">forms — drafted with AI, ready to review.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="812" y="92" width="478" height="584" rx="26" fill="#FFFFFF"/>
  </g>
  <g transform="translate(812,92)">
    <circle cx="44" cy="46" r="14" fill="#F1ECFD"/>
    <circle cx="82" cy="46" r="14" fill="#F1ECFD"/>
    <rect x="300" y="34" width="56" height="24" rx="12" fill="#EDE7FB"/>
    <text x="328" y="51" font-size="13" font-weight="700" fill="#5A27E0" text-anchor="middle">TRIAL</text>
    <text x="446" y="51" font-size="15" fill="#3A3247" text-anchor="end">Peter Anwyll</text>

    <text x="32" y="100" font-size="13" font-weight="700" fill="#8A839B" letter-spacing="0.5">GENERATE DOCUMENT · SMITH-X</text>

    <!-- template selector -->
    <rect x="32" y="116" width="414" height="48" rx="12" fill="#FFFFFF" stroke="#D9D2EC"/>
    <text x="50" y="138" font-size="12" fill="#9A93AC">TEMPLATE</text>
    <text x="50" y="156" font-size="15.5" font-weight="700" fill="#1C1530">Client care letter</text>
    <path d="M420 134 l8 9 l8 -9" fill="none" stroke="#8A839B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- generated preview -->
    <rect x="32" y="180" width="414" height="270" rx="16" fill="#FBFAFF" stroke="#ECE7F8"/>
    <text x="52" y="210" font-size="14.5" fill="#2B2540">Dear <tspan fill="#5A27E0" font-weight="700">Ms Hartley</tspan>,</text>
    <text x="52" y="240" font-size="14.5" font-weight="700" fill="#1C1530">Re: Purchase of <tspan fill="#5A27E0">12 Oak Lane</tspan></text>
    <text x="52" y="276" font-size="14.5" fill="#2B2540">We are instructed to act for you in connection</text>
    <text x="52" y="297" font-size="14.5" fill="#2B2540">with your purchase of <tspan fill="#5A27E0" font-weight="700">12 Oak Lane</tspan> at the</text>
    <text x="52" y="318" font-size="14.5" fill="#2B2540">agreed price of <tspan fill="#5A27E0" font-weight="700">£420,000</tspan>, with completion</text>
    <text x="52" y="339" font-size="14.5" fill="#2B2540">anticipated <tspan fill="#5A27E0" font-weight="700">28 days after exchange</tspan>.</text>
    <text x="52" y="375" font-size="14.5" fill="#2B2540">This letter sets out the basis of our charges and</text>
    <text x="52" y="396" font-size="14.5" fill="#2B2540">the scope of the work we will carry out...</text>
    <rect x="52" y="416" width="170" height="22" rx="11" fill="#EDE7FB"/>
    <text x="66" y="431" font-size="12.5" font-weight="600" fill="#5A27E0">6 fields filled from matter</text>

    <text x="32" y="480" font-size="13.5" fill="#7A7388">Saved to the SMITH-X folder in your OneDrive.</text>
    <rect x="32" y="494" width="414" height="50" rx="13" fill="#5A27E0"/>
    <text x="239" y="525" font-size="17" font-weight="700" fill="#FFFFFF" text-anchor="middle">Create document</text>

    <line x1="0" y1="568" x2="478" y2="568" stroke="#EEEAF7"/>
    <rect x="288" y="594" width="40" height="3" rx="1.5" fill="#5A27E0"/>
    <text x="170" y="590" font-size="20" fill="#B7B1C4" text-anchor="middle">✉</text>
    <text x="239" y="590" font-size="20" fill="#B7B1C4" text-anchor="middle">⌂</text>
    <text x="308" y="590" font-size="18" fill="#5A27E0" text-anchor="middle">📎</text>
  </g>
</svg>
