<svg xmlns="http://www.w3.org/2000/svg" width="1366" height="768" viewBox="0 0 1366 768" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5A27E0"/>
      <stop offset="1" stop-color="#3A12A8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#1a0a4a" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1366" height="768" fill="#F4F1FE"/>
  <rect width="760" height="768" fill="url(#bg)"/>

  <g fill="#FFFFFF">
    <g transform="translate(80,150)">
      <rect width="44" height="44" rx="11" fill="#FFFFFF"/>
      <path d="M9 22 C15 13 21 13 26 22 C31 31 37 31 43 22" transform="translate(-2,-2)" fill="none" stroke="#5A27E0" stroke-width="4.5" stroke-linecap="round"/>
      <text x="60" y="30" font-size="26" font-weight="700">CONVEYi</text>
    </g>
    <text x="80" y="320" font-size="58" font-weight="800">See where every</text>
    <text x="80" y="386" font-size="58" font-weight="800">matter stands.</text>
    <text x="80" y="456" font-size="25" fill="#E4DBFF">CONVEYi keeps each case organised — files emails and</text>
    <text x="80" y="490" font-size="25" fill="#E4DBFF">documents to the right matter, tracks the stage, and</text>
    <text x="80" y="524" font-size="25" fill="#E4DBFF">surfaces what's outstanding.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="812" y="92" width="478" height="584" rx="26" fill="#FFFFFF"/>
  </g>
  <g transform="translate(812,92)">
    <!-- top bar -->
    <circle cx="44" cy="46" r="14" fill="#F1ECFD"/>
    <circle cx="82" cy="46" r="14" fill="#F1ECFD"/>
    <rect x="300" y="34" width="56" height="24" rx="12" fill="#EDE7FB"/>
    <text x="328" y="51" font-size="13" font-weight="700" fill="#5A27E0" text-anchor="middle">TRIAL</text>
    <text x="446" y="51" font-size="15" fill="#3A3247" text-anchor="end">Peter Anwyll</text>

    <text x="32" y="100" font-size="13" font-weight="700" fill="#8A839B" letter-spacing="0.5">YOUR MATTERS</text>

    <!-- matter card template -->
    <g>
      <rect x="32" y="116" width="414" height="86" rx="16" fill="#FBFAFF" stroke="#ECE7F8"/>
      <circle cx="54" cy="142" r="6" fill="#1FAE6B"/>
      <text x="72" y="147" font-size="16.5" font-weight="700" fill="#1C1530">SMITH-X · 12 Oak Lane</text>
      <rect x="32" y="170" width="92" height="22" rx="11" fill="#EDE7FB" transform="translate(40,0)"/>
      <text x="118" y="185" font-size="12.5" font-weight="700" fill="#5A27E0">Contract</text>
      <text x="226" y="185" font-size="13" fill="#7A7388">2 items outstanding</text>
      <text x="424" y="147" font-size="13" fill="#9A93AC" text-anchor="end">3d</text>
    </g>

    <g>
      <rect x="32" y="214" width="414" height="86" rx="16" fill="#FBFAFF" stroke="#ECE7F8"/>
      <circle cx="54" cy="240" r="6" fill="#E0A000"/>
      <text x="72" y="245" font-size="16.5" font-weight="700" fill="#1C1530">JONES-P · 4 Birch Road</text>
      <rect x="72" y="268" width="86" height="22" rx="11" fill="#EDE7FB"/>
      <text x="115" y="283" font-size="12.5" font-weight="700" fill="#5A27E0" text-anchor="middle">Searches</text>
      <text x="226" y="283" font-size="13" fill="#7A7388">1 item outstanding</text>
      <text x="424" y="245" font-size="13" fill="#9A93AC" text-anchor="end">6d</text>
    </g>

    <g>
      <rect x="32" y="312" width="414" height="86" rx="16" fill="#FBFAFF" stroke="#ECE7F8"/>
      <circle cx="54" cy="338" r="6" fill="#1FAE6B"/>
      <text x="72" y="343" font-size="16.5" font-weight="700" fill="#1C1530">PATEL-K · 9 Elm Court</text>
      <rect x="72" y="366" width="84" height="22" rx="11" fill="#EDE7FB"/>
      <text x="114" y="381" font-size="12.5" font-weight="700" fill="#5A27E0" text-anchor="middle">Exchange</text>
      <text x="226" y="381" font-size="13" fill="#7A7388">On track</text>
      <text x="424" y="343" font-size="13" fill="#9A93AC" text-anchor="end">1d</text>
    </g>

    <g>
      <rect x="32" y="410" width="414" height="86" rx="16" fill="#FBFAFF" stroke="#ECE7F8"/>
      <circle cx="54" cy="436" r="6" fill="#D64545"/>
      <text x="72" y="441" font-size="16.5" font-weight="700" fill="#1C1530">OKAFOR-D · 22 Maple Way</text>
      <rect x="72" y="464" width="84" height="22" rx="11" fill="#EDE7FB"/>
      <text x="114" y="479" font-size="12.5" font-weight="700" fill="#5A27E0" text-anchor="middle">Enquiries</text>
      <text x="226" y="479" font-size="13" fill="#D64545" font-weight="600">Chase needed</text>
      <text x="424" y="441" font-size="13" fill="#9A93AC" text-anchor="end">11d</text>
    </g>

    <text x="32" y="534" font-size="13" fill="#9A93AC">Age dots show how long each matter has sat at its stage.</text>

    <!-- bottom nav -->
    <line x1="0" y1="560" x2="478" y2="560" stroke="#EEEAF7"/>
    <rect x="219" y="586" width="40" height="3" rx="1.5" fill="#5A27E0"/>
    <text x="170" y="582" font-size="20" fill="#B7B1C4" text-anchor="middle">✉</text>
    <text x="239" y="582" font-size="20" fill="#5A27E0" text-anchor="middle">⌂</text>
    <text x="308" y="582" font-size="18" fill="#B7B1C4" text-anchor="middle">📎</text>
  </g>
</svg>
