<svg xmlns="http://www.w3.org/2000/svg" width="1366" height="768" viewBox="0 0 1366 768" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5A27E0"/>
      <stop offset="1" stop-color="#3A12A8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#1a0a4a" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1366" height="768" fill="#F4F1FE"/>
  <rect width="760" height="768" fill="url(#bg)"/>

  <g fill="#FFFFFF">
    <g transform="translate(80,150)">
      <rect width="44" height="44" rx="11" fill="#FFFFFF"/>
      <path d="M9 22 C15 13 21 13 26 22 C31 31 37 31 43 22" transform="translate(-2,-2)" fill="none" stroke="#5A27E0" stroke-width="4.5" stroke-linecap="round"/>
      <text x="60" y="30" font-size="26" font-weight="700">CONVEYi</text>
    </g>
    <text x="80" y="320" font-size="56" font-weight="800">Filed in your own</text>
    <text x="80" y="384" font-size="56" font-weight="800">OneDrive &amp; Excel.</text>
    <text x="80" y="454" font-size="25" fill="#E4DBFF">Every matter gets a OneDrive folder and a live Excel</text>
    <text x="80" y="488" font-size="25" fill="#E4DBFF">tracker — emails and documents in one place, in your</text>
    <text x="80" y="522" font-size="25" fill="#E4DBFF">own Microsoft 365. Nothing leaves your tenant.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="812" y="92" width="478" height="584" rx="26" fill="#FFFFFF"/>
  </g>
  <g transform="translate(812,92)">
    <circle cx="44" cy="46" r="14" fill="#F1ECFD"/>
    <circle cx="82" cy="46" r="14" fill="#F1ECFD"/>
    <rect x="300" y="34" width="56" height="24" rx="12" fill="#EDE7FB"/>
    <text x="328" y="51" font-size="13" font-weight="700" fill="#5A27E0" text-anchor="middle">TRIAL</text>
    <text x="446" y="51" font-size="15" fill="#3A3247" text-anchor="end">Peter Anwyll</text>

    <!-- breadcrumb -->
    <text x="32" y="98" font-size="13" fill="#9A93AC">OneDrive  ›  CONVEYi  ›  <tspan fill="#5A27E0" font-weight="700">SMITH-X</tspan></text>

    <!-- excel tracker callout -->
    <rect x="32" y="114" width="414" height="56" rx="14" fill="#EAF7EF" stroke="#CDEBD9"/>
    <rect x="46" y="128" width="28" height="28" rx="7" fill="#1E8E54"/>
    <text x="60" y="148" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">X</text>
    <text x="86" y="138" font-size="15" font-weight="700" fill="#1C1530">SMITH-X tracker.xlsx</text>
    <text x="86" y="158" font-size="12.5" fill="#5C7A68">Live · key dates, parties &amp; milestones</text>
    <text x="430" y="148" font-size="12.5" fill="#1E8E54" font-weight="700" text-anchor="end">OPEN</text>

    <text x="32" y="200" font-size="13" font-weight="700" fill="#8A839B" letter-spacing="0.5">MATTER FILES</text>

    <!-- file rows -->
    <g font-size="14.5">
      <g transform="translate(0,0)">
        <rect x="40" y="214" width="22" height="26" rx="4" fill="#E5453C"/>
        <text x="51" y="231" font-size="8" font-weight="700" fill="#FFFFFF" text-anchor="middle">PDF</text>
        <text x="74" y="225" font-weight="600" fill="#1C1530">Draft contract.pdf</text>
        <text x="74" y="241" font-size="11.5" fill="#9A93AC">Filed from email · 2 days ago</text>
      </g>
      <line x1="40" y1="256" x2="446" y2="256" stroke="#F0ECF8"/>
      <g transform="translate(0,52)">
        <rect x="40" y="214" width="22" height="26" rx="4" fill="#E5453C"/>
        <text x="51" y="231" font-size="8" font-weight="700" fill="#FFFFFF" text-anchor="middle">PDF</text>
        <text x="74" y="225" font-weight="600" fill="#1C1530">EPC.pdf</text>
        <text x="74" y="241" font-size="11.5" fill="#9A93AC">Filed from email · 2 days ago</text>
      </g>
      <line x1="40" y1="308" x2="446" y2="308" stroke="#F0ECF8"/>
      <g transform="translate(0,104)">
        <rect x="40" y="214" width="22" height="26" rx="4" fill="#E5453C"/>
        <text x="51" y="231" font-size="8" font-weight="700" fill="#FFFFFF" text-anchor="middle">PDF</text>
        <text x="74" y="225" font-weight="600" fill="#1C1530">TA10 fixtures &amp; fittings.pdf</text>
        <text x="74" y="241" font-size="11.5" fill="#9A93AC">Filed from email · 4 days ago</text>
      </g>
      <line x1="40" y1="360" x2="446" y2="360" stroke="#F0ECF8"/>
      <g transform="translate(0,156)">
        <rect x="40" y="214" width="22" height="26" rx="4" fill="#2B6FE5"/>
        <text x="51" y="231" font-size="7.5" font-weight="700" fill="#FFFFFF" text-anchor="middle">DOC</text>
        <text x="74" y="225" font-weight="600" fill="#1C1530">Client care letter.docx</text>
        <text x="74" y="241" font-size="11.5" fill="#9A93AC">Generated by CONVEYi · today</text>
      </g>
    </g>

    <text x="32" y="500" font-size="13.5" fill="#7A7388">Stored in your own Microsoft 365 — your data, your tenant.</text>

    <line x1="0" y1="568" x2="478" y2="568" stroke="#EEEAF7"/>
    <rect x="288" y="594" width="40" height="3" rx="1.5" fill="#5A27E0"/>
    <text x="170" y="590" font-size="20" fill="#B7B1C4" text-anchor="middle">✉</text>
    <text x="239" y="590" font-size="20" fill="#B7B1C4" text-anchor="middle">⌂</text>
    <text x="308" y="590" font-size="18" fill="#5A27E0" text-anchor="middle">📎</text>
  </g>
</svg>
